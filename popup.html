<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>X Liked-back Helper</title>
  <link rel="stylesheet" href="popup.css">
  <style>
    .user-item.is-done {
      opacity: 0.5;
      filter: grayscale(0.8);
    }
    .user-item.is-done .action-btn {
      background: #ccc;
      cursor: default;
      pointer-events: none;
    }
    .action-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      filter: grayscale(1);
    }
  </style>
</head>
<body>
  <div class="container">
    <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
      <h1 style="margin: 0; font-size: 1.2rem;">X Liked-back Helper</h1>
      <div id="self-icon-header" class="user-avatar" style="width: 36px; height: 36px; cursor: pointer; margin: 0; background-color: rgba(255,255,255,0.2); border: 1px solid var(--glass-border); display: flex; align-items: center; justify-content: center; font-size: 0.6rem; color: #fff; border-radius: 50%;" title="マイホームへ">HOME</div>
    </header>

    <div class="status-card">
      <div id="current-status" class="status-value">いいねを返したいポストを開いて</div>
    </div>

    <div class="controls" style="display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 12px; background: rgba(255, 255, 255, 0.4); padding: 8px 12px; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.3);">
      <span id="list-count" style="font-size: 0.85rem; font-weight: bold; color: var(--primary-color); white-space: nowrap;">0 / 0</span>
      
      <label style="font-size: 0.75rem; color: var(--secondary-text); display: flex; align-items: center; cursor: pointer; white-space: nowrap;">
        <input type="checkbox" id="show-done-toggle" style="margin-right: 4px;"> 完了表示
      </label>
      
      <button id="reset-btn" class="action-btn secondary" style="padding: 4px 10px; font-size: 0.65rem;">リセット</button>
    </div>

    <div id="timeline-actions" style="margin-bottom: 12px;">
      <div style="display: flex; gap: 8px;">
        <button id="next-post-btn" class="action-btn secondary" style="flex: 1; padding: 10px; font-size: 0.9rem;" title="次のポストへ (J)">↓(J)</button>
        <button id="prev-post-btn" class="action-btn secondary" style="flex: 1; padding: 10px; font-size: 0.9rem;" title="前のポストへ (K)">↑(K)</button>
        <button id="like-top-btn" class="action-btn primary" style="flex: 3; padding: 10px; font-size: 0.85rem; display: flex; align-items: center; justify-content: center; gap: 4px;">
          <span>Like(L)</span>
          <span style="font-size: 1rem;">❤️</span>
        </button>
      </div>
    </div>

    <div class="section-title" style="font-size: 0.8rem; font-weight: 700; margin-bottom: 8px; color: var(--secondary-text);">
      ユーザーリスト
    </div>

    <div id="user-list" class="user-list">
      <div class="empty-state" style="text-align: center; padding: 20px; color: var(--secondary-text); font-size: 0.8rem;">
        対象ページを開いてスクロールすると自動で追加されます。
      </div>
    </div>
  </div>

  <footer>
    &copy; 2026 X Liked-back Helper
  </footer>

  <script src="constants.js"></script>
  <script src="popup.js"></script>
</body>
</html>
