<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>X Liked-back Helper</title>
  <link rel="stylesheet" href="popup.css">
  <style>
    .user-item.is-done {
      opacity: 0.5;
      filter: grayscale(0.8);
    }
    .user-item.is-done .action-btn {
      background: #ccc;
      cursor: default;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
      <h1 style="margin: 0; font-size: 1.2rem;">X Liked-back Helper</h1>
      <div id="self-icon" class="user-avatar" style="width: 44px; height: 44px; cursor: pointer; margin: 0; background-color: rgba(255,255,255,0.2); border: 1px solid var(--glass-border); display: flex; align-items: center; justify-content: center; font-size: 0.6rem; color: #fff; border-radius: 50%;" title="マイホームへ">HOME</div>
    </header>

    <div class="status-card">
      <div class="status-label">現在のページ</div>
      <div id="current-status" class="status-value">「いいね」一覧を開いてください</div>
    </div>

    <div class="controls" style="display: flex; gap: 8px; margin-bottom: 12px; align-items: center;">
      <button id="fetch-btn" class="action-btn" style="flex: 2;">リスト取得</button>
      <button id="reset-btn" class="action-btn secondary" style="flex: 1;">リセット</button>
    </div>

    <div class="filter-controls" style="display: flex; justify-content: flex-end; margin-bottom: 8px;">
      <label style="font-size: 0.75rem; color: var(--secondary-text); display: flex; align-items: center; cursor: pointer;">
        <input type="checkbox" id="show-done-toggle" style="margin-right: 4px;"> 完了を表示
      </label>
    </div>

    <div class="section-title" style="font-size: 0.8rem; font-weight: 700; margin-bottom: 8px; color: var(--secondary-text);">
      ユーザーリスト
    </div>

    <div id="user-list" class="user-list">
      <div class="empty-state" style="text-align: center; padding: 20px; color: var(--secondary-text); font-size: 0.8rem;">
        「リスト取得」を押すとユーザーが表示されます。
      </div>
    </div>
  </div>

  <footer>
    &copy; 2026 X Liked-back Helper
  </footer>

  <script src="popup.js"></script>
</body>
</html>
