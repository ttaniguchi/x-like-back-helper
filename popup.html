<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>X Liked-back Helper</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>X Liked-back Helper</h1>
      <div class="header-actions">
        <button id="theme-toggle" class="icon-btn" title="テーマ切り替え">🌙</button>
        <div id="self-icon-header" class="user-avatar-header" title="マイホームへ">HOME</div>
      </div>
    </header>


    <!-- Main View: Likes List -->
    <div id="likes-view">
      <div class="status-card">
        <div class="status-value" id="current-status"></div>
      </div>

      <div class="controls-row">
        <div class="list-stat">
          <span class="stat-count" id="list-count">0 / 0</span>
          <label class="done-toggle">
            <input type="checkbox" id="show-done-toggle"> 完了表示
          </label>
        </div>
        <button id="reset-btn" class="action-btn secondary small">リセット</button>
      </div>

      <div id="timeline-actions">
        <div class="nav-btns">
          <button id="prev-post-btn" class="action-btn secondary nav-btn" title="前のポストへ (K)">↑</button>
          <button id="next-post-btn" class="action-btn secondary nav-btn" title="次のポストへ (J)">↓</button>
          <button id="like-top-btn" class="action-btn primary like-btn">
            <span>Like(L)</span> ❤️
          </button>
        </div>
      </div>

      <div id="user-list" class="user-list">
        <div class="empty-state">対象ページを開くと自動で追加されます。</div>
      </div>
    </div>

    <!-- Hidden View: Follower Audit -->
    <div id="audit-view" style="display: none;">
      <div class="status-card">
        <div class="status-value" id="audit-status"></div>
      </div>

      <div class="controls-row">
        <div class="list-stat">
          <span class="stat-count" id="audit-count">0</span> 件のワンウェイ
        </div>
        <button id="reset-audit-btn" class="action-btn secondary small">リセット</button>
      </div>

      <div id="audit-list" class="user-list audit-mode">
        <!-- Audit users will be listed here -->
      </div>
    </div>
  </div>

  <footer>
    &copy; 2026 X Liked-back Helper
  </footer>

  <script src="constants.js"></script>
  <script src="popup.js"></script>
</body>
</html>
